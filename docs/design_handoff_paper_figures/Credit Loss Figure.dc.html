<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/plan-my-transfer-design-system-38282b72-9397-400f-b325-90895344021e/styles.css">
  <script src="_ds/plan-my-transfer-design-system-38282b72-9397-400f-b325-90895344021e/_ds_bundle.js"></script>
  <style>
    body { margin: 0; background: var(--color-bg); }
    a { color: var(--link-color); text-decoration: none; }
    a:hover { color: var(--link-color-hover); }
  </style>
</helmet>
<div style="width: 1240px; box-sizing: border-box; background: var(--surface-card); padding: 22px 24px; font-family: var(--font-sans); color: var(--text-body);">
  <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 8px 18px; margin-bottom: 14px;">
    <sc-for list="{{ legend }}" as="item" hint-placeholder-count="5">
      <div style="display: flex; align-items: center; gap: 7px;">
        <div style="width: 20px; height: 12px; border-radius: 3px; background: {{ item.color }}; box-shadow: inset 0 0 0 1px var(--border-hairline);"></div>
        <span style="font-size: var(--text-xs); color: var(--text-body);">{{ item.label }}</span>
      </div>
    </sc-for>
  </div>
  <div style="display: flex; align-items: flex-start;">
    <div style="position: relative; width: 52px; height: 340px; flex: none;">
      <div style="position: absolute; left: -2px; top: 0; bottom: 0; width: 18px; display: flex; align-items: center; justify-content: center;">
        <span style="transform: rotate(-90deg); white-space: nowrap; font-size: var(--text-sm); color: var(--text-body);">Number of courses</span>
      </div>
      <sc-for list="{{ ticks }}" as="t" hint-placeholder-count="5">
        <div style="position: absolute; right: 8px; top: {{ t.topStyle }}; transform: translateY(-50%); line-height: 1; font-size: var(--text-xs); color: var(--text-body); font-variant-numeric: tabular-nums;">{{ t.value }}</div>
      </sc-for>
    </div>
    <div style="flex: 1 1 0;">
      <div style="position: relative; height: 340px;">
        <sc-for list="{{ ticks }}" as="t" hint-placeholder-count="5">
          <div style="position: absolute; left: 0; right: 0; top: {{ t.topStyle }}; height: 1px; background: var(--pmt-forest-a10);"></div>
        </sc-for>
        <div style="position: absolute; left: 0; right: 0; bottom: 0; height: 1.5px; background: var(--pmt-ink-400);"></div>
        <div style="position: absolute; inset: 0; display: flex; align-items: flex-end;">
          <sc-for list="{{ campuses }}" as="campus" hint-placeholder-count="9">
            <div style="flex: 1 1 0; height: 100%; display: flex; align-items: flex-end; justify-content: center; gap: 4px;">
              <div style="width: 16px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;">
                <sc-if value="{{ campus.showReqLabel }}" hint-placeholder-val="{{ true }}">
                  <div style="height: 36px; display: flex; align-items: flex-end; justify-content: center;">
                    <span style="writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--text-strong); font-variant-numeric: tabular-nums; line-height: 1;">{{ campus.reqLabel }}</span>
                  </div>
                </sc-if>
                <sc-if value="{{ campus.hasHatch }}" hint-placeholder-val="{{ false }}">
                  <div style="width: 100%; height: {{ campus.goldHatchStyle }}; background-image: repeating-linear-gradient(45deg, var(--pmt-gold-400) 0, var(--pmt-gold-400) 2px, var(--pmt-cream-100) 2px, var(--pmt-cream-100) 9px); box-shadow: inset 0 0 0 1px var(--border-hairline); border-radius: 3px 3px 0 0;"></div>
                </sc-if>
                <div style="position: relative; width: 100%; height: {{ campus.goldSolidStyle }}; background: var(--pmt-gold-400); box-shadow: inset 0 0 0 1px var(--border-hairline); border-radius: {{ campus.solidRadius }};">
                  <sc-if value="{{ campus.showSolidLabel }}" hint-placeholder-val="{{ false }}">
                    <div style="position: absolute; top: 3px; left: 0; right: 0; display: flex; justify-content: center;">
                      <span style="writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--pmt-forest-900); font-variant-numeric: tabular-nums; line-height: 1;">{{ campus.solidLabel }}</span>
                    </div>
                  </sc-if>
                </div>
              </div>
              <sc-for list="{{ campus.choices }}" as="choice" hint-placeholder-count="4">
                <div style="width: 16px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; --bar-color: {{ choice.color }};">
                  <sc-if value="{{ choice.showLabel }}" hint-placeholder-val="{{ true }}">
                    <div style="height: 36px; display: flex; align-items: flex-end; justify-content: center;">
                      <span style="writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--text-strong); font-variant-numeric: tabular-nums; line-height: 1;">{{ choice.label }}</span>
                    </div>
                  </sc-if>
                  <div style="width: 100%; height: {{ choice.hStyle }}; background: var(--bar-color, var(--pmt-forest-900)); border-radius: 3px 3px 0 0; box-shadow: inset 0 0 0 1px var(--border-hairline);"></div>
                </div>
              </sc-for>
            </div>
          </sc-for>
        </div>
      </div>
      <div style="display: flex; margin-top: 6px;">
        <sc-for list="{{ campuses }}" as="campus" hint-placeholder-count="9">
          <div style="flex: 1 1 0; text-align: center; line-height: 1.15; padding: 0 2px; font-size: var(--text-xs); color: var(--text-body);">{{ campus.name }}<sc-if value="{{ campus.quarter }}" hint-placeholder-val="{{ true }}"><sup style="font-size: 0.78em;">*</sup></sc-if></div>
        </sc-for>
      </div>
      <div style="text-align: center; margin-top: 12px; font-size: var(--text-sm); color: var(--text-body);">University of California campus</div>
    </div>
  </div>
  <div style="margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px 20px; align-items: center;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 20px; height: 12px; border-radius: 3px; background-image: repeating-linear-gradient(45deg, var(--pmt-gold-400) 0, var(--pmt-gold-400) 2px, var(--pmt-cream-100) 2px, var(--pmt-cream-100) 9px); box-shadow: inset 0 0 0 1px var(--border-hairline);"></div>
      <span style="font-size: var(--text-xs); color: var(--text-body);">Hatched = requirement under the quarter system (semester-equivalent shown solid)</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <span style="font-size: var(--text-sm); font-weight: var(--fw-semibold); color: var(--text-body); line-height: 1;">*</span>
      <span style="font-size: var(--text-xs); color: var(--text-body);">quarter-system campus &nbsp;·&nbsp; unmarked = semester</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1240, &quot;height&quot;: 500 },
  &quot;showValues&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;All bars&quot;, &quot;Requirement &amp; 1st choice&quot;, &quot;None&quot;],
    &quot;default&quot;: &quot;All bars&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Chart&quot;
  },
  &quot;showQuarterHatch&quot;: {
    &quot;editor&quot;: &quot;boolean&quot;,
    &quot;default&quot;: true,
    &quot;tsType&quot;: &quot;boolean&quot;,
    &quot;section&quot;: &quot;Chart&quot;
  }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const mode = p.showValues || 'All bars';
    const labelsOn = mode !== 'None';
    const keyOnly = mode === 'Requirement & 1st choice';
    const showHatch = p.showQuarterHatch !== false;

    const axisMax = 8;
    const fillFrac = 0.82;
    const hFn = (v) => (v / axisMax) * fillFrac * 100;

    const choiceColors = ['#1E3A5F', '#38618C', '#6E93BF', '#A9C3DE'];

    const raw = [
      { name: 'Davis',         q: true,  solid: 5.33, req: 8.00, ch: [7.07, 3.57, 2.55, 1.92] },
      { name: 'Merced',        q: false, solid: 6.00, req: 6.00, ch: [6.80, 2.78, 1.51, 0.81] },
      { name: 'San Diego',     q: true,  solid: 4.67, req: 7.00, ch: [7.16, 3.16, 1.92, 1.27] },
      { name: 'Santa Barbara', q: true,  solid: 4.67, req: 7.00, ch: [7.04, 3.05, 1.81, 1.11] },
      { name: 'Los Angeles',   q: true,  solid: 4.67, req: 7.00, ch: [5.89, 2.25, 1.21, 0.65] },
      { name: 'Berkeley',      q: false, solid: 4.00, req: 4.00, ch: [4.83, 1.64, 0.83, 0.37] },
      { name: 'Santa Cruz',    q: true,  solid: 3.33, req: 5.00, ch: [5.15, 2.22, 1.56, 1.14] },
      { name: 'Irvine',        q: true,  solid: 4.00, req: 6.00, ch: [4.40, 2.31, 2.16, 1.61] },
      { name: 'Riverside',     q: true,  solid: 3.33, req: 5.00, ch: [4.00, 1.25, 0.76, 0.51] },
    ];

    const campuses = raw.map((c) => {
      const useHatch = showHatch && c.q && (c.req - c.solid) > 0.001;
      const goldTop = useHatch ? c.req : c.solid;
      return {
        name: c.name,
        quarter: c.q,
        hasHatch: useHatch,
        goldSolidStyle: hFn(c.solid).toFixed(3) + '%',
        goldHatchStyle: hFn(useHatch ? (c.req - c.solid) : 0).toFixed(3) + '%',
        solidRadius: useHatch ? '0px 0px 0 0' : '3px 3px 0 0',
        reqLabel: goldTop.toFixed(2),
        solidLabel: c.solid.toFixed(2),
        showReqLabel: labelsOn,
        showSolidLabel: labelsOn && useHatch,
        choices: c.ch.map((v, i) => ({
          hStyle: hFn(v).toFixed(3) + '%',
          label: v.toFixed(2),
          color: choiceColors[i],
          showLabel: labelsOn && (!keyOnly || i === 0),
        })),
      };
    });

    const ticks = [0, 2, 4, 6, 8].map((t) => ({ value: t, topStyle: (100 - hFn(t)).toFixed(3) + '%' }));

    const legend = [
      { label: 'CS/Math requirement', color: 'var(--pmt-gold-400)' },
      { label: '1st choice', color: choiceColors[0] },
      { label: '2nd choice', color: choiceColors[1] },
      { label: '3rd choice', color: choiceColors[2] },
      { label: '4th choice', color: choiceColors[3] },
    ];

    return { campuses, ticks, legend };
  }
}
</script>
</body>
</html>
